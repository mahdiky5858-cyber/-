<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="css/weather-style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="weather-container">
        <!-- Header -->
        <header class="weather-header">
            <h1><i class="fas fa-cloud-sun"></i> Weather Dashboard</h1>
            <p>Get real-time weather information for any location</p>
        </header>

        <!-- Search Section -->
        <section class="search-section">
            <div class="search-box">
                <input 
                    type="text" 
                    id="city-input" 
                    placeholder="Search for a city..." 
                    autocomplete="off"
                >
                <button id="search-btn" class="btn-search">
                    <i class="fas fa-search"></i>
                </button>
                <button id="location-btn" class="btn-location" title="Use current location">
                    <i class="fas fa-location-dot"></i>
                </button>
            </div>
            <div id="search-suggestions" class="search-suggestions hidden"></div>
        </section>

        <!-- Loading State -->
        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>Loading weather data...</p>
        </div>

        <!-- Error State -->
        <div id="error-message" class="error-message hidden"></div>

        <!-- Current Weather -->
        <section id="current-weather" class="current-weather hidden">
            <div class="weather-main">
                <div class="location-info">
                    <h2 id="city-name"></h2>
                    <p id="date-time"></p>
                </div>
                <div class="weather-icon-temp">
                    <img id="weather-icon" src="" alt="Weather icon" class="weather-icon">
                    <div class="temp-info">
                        <span id="temperature" class="temperature"></span>
                        <span id="weather-description" class="description"></span>
                    </div>
                </div>
            </div>

            <!-- Weather Details Grid -->
            <div class="weather-details-grid">
                <div class="detail-card">
                    <div class="detail-icon"><i class="fas fa-droplets"></i></div>
                    <div class="detail-content">
                        <p class="detail-label">Humidity</p>
                        <p id="humidity" class="detail-value">-</p>
                    </div>
                </div>

                <div class="detail-card">
                    <div class="detail-icon"><i class="fas fa-wind"></i></div>
                    <div class="detail-content">
                        <p class="detail-label">Wind Speed</p>
                        <p id="wind-speed" class="detail-value">-</p>
                    </div>
                </div>

                <div class="detail-card">
                    <div class="detail-icon"><i class="fas fa-gauge"></i></div>
                    <div class="detail-content">
                        <p class="detail-label">Pressure</p>
                        <p id="pressure" class="detail-value">-</p>
                    </div>
                </div>

                <div class="detail-card">
                    <div class="detail-icon"><i class="fas fa-eye"></i></div>
                    <div class="detail-content">
                        <p class="detail-label">Visibility</p>
                        <p id="visibility" class="detail-value">-</p>
                    </div>
                </div>

                <div class="detail-card">
                    <div class="detail-icon"><i class="fas fa-sun"></i></div>
                    <div class="detail-content">
                        <p class="detail-label">UV Index</p>
                        <p id="uv-index" class="detail-value">-</p>
                    </div>
                </div>

                <div class="detail-card">
                    <div class="detail-icon"><i class="fas fa-arrow-up"></i></div>
                    <div class="detail-content">
                        <p class="detail-label">Feels Like</p>
                        <p id="feels-like" class="detail-value">-</p>
                    </div>
                </div>
            </div>

            <!-- Additional Info -->
            <div class="additional-info">
                <div class="info-item">
                    <label>Sunrise</label>
                    <span id="sunrise">-</span>
                </div>
                <div class="info-item">
                    <label>Sunset</label>
                    <span id="sunset">-</span>
                </div>
                <div class="info-item">
                    <label>Cloud Coverage</label>
                    <span id="clouds">-</span>
                </div>
                <div class="info-item">
                    <label>Precipitation</label>
                    <span id="precipitation">-</span>
                </div>
            </div>
        </section>

        <!-- Forecast Section -->
        <section id="forecast-section" class="forecast-section hidden">
            <h3><i class="fas fa-calendar-days"></i> 5-Day Forecast</h3>
            <div id="forecast-container" class="forecast-container"></div>
        </section>

        <!-- Saved Locations -->
        <section class="saved-locations">
            <h3><i class="fas fa-bookmark"></i> Saved Locations</h3>
            <div id="saved-list" class="saved-list">
                <p class="empty-state">No saved locations yet</p>
            </div>
        </section>

        <!-- Unit Toggle -->
        <div class="unit-toggle">
            <button id="toggle-unit" class="btn-unit">
                <i class="fas fa-thermometer"></i> Switch to °F
            </button>
        </div>

        <!-- Footer -->
        <footer class="weather-footer">
            <p>Powered by <a href="https://openweathermap.org" target="_blank">OpenWeatherMap API</a></p>
            <p>Last updated: <span id="last-updated">-</span></p>
        </footer>
    </div>

    <script src="js/weather-dashboard.js"></script>
</body>
</html>
